services:
  chicken-herd-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chicken-herd-manager
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Persist SQLite database outside container
      - ./data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/server/data/chicken_herd.db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/chickens"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - chicken-net

networks:
  chicken-net:
    driver: bridge
